spring.application.name=studymate

# === Base de données (H2, fichier local — développement uniquement) ===
# H2 stocke les données dans un simple fichier ./data/studymate.mv.db
# Pas de serveur à installer. En production, on passera sur PostgreSQL
# en changeant simplement ces lignes.
spring.datasource.url=jdbc:h2:file:./data/studymate
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate crée ou met à jour les tables automatiquement
# à partir de nos classes @Entity (pratique en dev)
spring.jpa.hibernate.ddl-auto=update

# Affiche dans la console les requêtes SQL exécutées — utile pour
# comprendre ce que fait Hibernate derrière les objets Java
spring.jpa.show-sql=true

# Console web de H2 : http://localhost:8080/h2-console
# permet de regarder le contenu de la BDD dans le navigateur
spring.h2.console.enabled=true
